<!DOCTYPE html>
<html>
<head>
  <title>FreshTrack Shopping List</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="navbar">
  <h2>Shopping List</h2>
  <div class="top-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="add-item.html">Add Item</a>
    <a href="admin.html">Analytics</a>
    <button type="button" onclick="logout()">Logout</button>
  </div>
</header>

<div class="form-box">
  <h3>Add Shopping Item</h3>
  <form id="shoppingForm">
    <input id="shoppingName" placeholder="Item Name" required>
    <select id="shoppingCategory" required>
      <option value="vegetables">Vegetables</option>
      <option value="grains">Grains</option>
      <option value="pulses">Pulses</option>
      <option value="medicines">Medicines</option>
      <option value="packed">Packed Food</option>
    </select>
    <input id="shoppingQtyNeeded" type="number" min="1" step="1" value="1" required>
    <button type="submit">Add To List</button>
  </form>
</div>

<table>
  <thead>
    <tr>
      <th>Item</th>
      <th>Category</th>
      <th>Qty Needed</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="shoppingBody"></tbody>
</table>

<script src="js/common.js"></script>
<script src="js/shopping.js"></script>
</body>
</html>
