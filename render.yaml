services:
  - type: web
    name: freshtrack
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_IN_PROCESS_CRON
        value: "false"
      - key: EXPIRY_CRON_SCHEDULE
        value: "0 9 * * *"
      - key: EXPIRY_CRON_TZ
        value: "Asia/Kolkata"

  - type: cron
    name: freshtrack-expiry-alerts
    env: node
    rootDir: backend
    schedule: "0 9 * * *"
    buildCommand: npm install
    startCommand: node scripts/runExpiryAlerts.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: EXPIRY_CRON_SCHEDULE
        value: "0 9 * * *"
      - key: EXPIRY_CRON_TZ
        value: "Asia/Kolkata"
